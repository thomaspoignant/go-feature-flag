name: PR assignment
on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: "Auto-assign PR"
        uses: pozil/auto-assign-issue@70adb98ca8b3941524e9ecde48e89067c4f96736 # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: thomaspoignant
          numOfAssignee: 1
