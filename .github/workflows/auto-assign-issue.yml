name: Issue assignment

on:
  issues:
    types: [opened]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: "Auto-assign issue"
        uses: pozil/auto-assign-issue@07fe6dc0e9771842b428f5739098d6140734e226 # v4.0.0
        with:
          assignees: thomaspoignant
          numOfAssignee: 1
          allowSelfAssign: false
