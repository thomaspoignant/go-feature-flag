name: Release Python provider to PyPi

on:
  workflow_call:
    secrets:
      pypi_token: { required: true }
permissions:
  actions: read
  contents: read

jobs:
  python-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Needed so the hatch build hook can copy the pinned WASI binary from
          # the wasm-releases submodule into the package (see hatch_build.py).
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Build package
        working-directory: ./openfeature/providers/python-provider
        run: uv build
      - name: Publish to PyPi
        working-directory: ./openfeature/providers/python-provider
        run: uv publish --token ${{ secrets.pypi_token }}
