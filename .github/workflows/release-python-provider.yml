name: Release Python provider to PyPi

on:
  workflow_call:
    secrets:
      pypi_token: { required: true }
permissions:
  actions: read
  contents: read

jobs:
  python-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          # Needed so the hatch build hook can copy the pinned WASI binary from
          # the wasm-releases submodule into the package (see hatch_build.py).
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"
      - name: Build package
        working-directory: ./openfeature/providers/python-provider
        run: uv build
      - name: Publish to PyPi
        working-directory: ./openfeature/providers/python-provider
        run: uv publish --token ${{ secrets.pypi_token }}
