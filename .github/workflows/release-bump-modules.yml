# ---------------------------------------
# Bump module dependency is a workflow that bumps the dependency of a module to the latest version.
# This is a reusable workflow and is used by the release-please workflow to bump the dependency of the module to the latest version.
# ---------------------------------------
name: bump module dependency
permissions:
  actions: read
  contents: read

on:
  workflow_call:
    inputs:
      modulePath: { type: string, required: true }
      version: { type: string, required: true }
      goModDirectoryPath: { type: string, required: false, default: "." }
      repository: { type: string, required: false, default: "" }   # external repo, e.g. open-feature/go-sdk-contrib; empty = this repo
      prTitle: { type: string, required: false, default: "" }       # override PR title/commit message
    secrets:
      token: { required: true }

jobs:
  bump-module:
    name: Bump module dependency ${{ inputs.modulePath }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.repository != '' && inputs.repository || github.repository }}
          token: ${{ secrets.token }}
          persist-credentials: false
      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.goModDirectoryPath }}/go.mod
          check-latest: true
          cache: false

      - name: Update internal module
        env:
          VERSION: ${{ inputs.version }}
          MODULE_PATH: ${{ inputs.modulePath }}
          GO_MOD_DIRECTORY_PATH: ${{ inputs.goModDirectoryPath }}
        run: |
          cd ${GO_MOD_DIRECTORY_PATH}
          export GOWORK=off
          go get github.com/thomaspoignant/go-feature-flag/${MODULE_PATH}@v${VERSION}
          go mod tidy
          go mod verify

      - name: Create Pull Request to bump module
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        env:
          VERSION: ${{ inputs.version }}
          MODULE_PATH: ${{ inputs.modulePath }}
          GO_MOD_DIRECTORY_PATH: ${{ inputs.goModDirectoryPath }}
        with:
          branch: bump-module-${{ env.GO_MOD_DIRECTORY_PATH }}-${{ env.MODULE_PATH}}-${{ env.VERSION }}
          title: "${{ inputs.prTitle != '' && inputs.prTitle || format('chore(dependency): Bump module {0} {1}', inputs.modulePath, inputs.version) }}"
          body: |
            Automated pull request to bump module ${{ env.MODULE_PATH}} to v${{ env.VERSION }}.
          commit-message: "${{ inputs.prTitle != '' && inputs.prTitle || format('chore(dependency): Bump module {0} {1}', inputs.modulePath, inputs.version) }}"
          assignees: ${{ inputs.repository == '' && 'thomaspoignant' || '' }}
          draft: false
          signoff: true
          delete-branch: true
          base: main
          labels: ${{ inputs.repository == '' && 'automerge' || '' }}
          token: ${{ secrets.token }}
