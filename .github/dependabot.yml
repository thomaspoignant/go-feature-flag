      default-days: 7

  # Providers
  - package-ecosystem: gradle
    directory: "/openfeature/providers/kotlin-provider/gofeatureflag-kotlin-provider"
    schedule:
      interval: weekly
      time: "01:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: "/openfeature/providers/python-provider"
    schedule:
      interval: weekly
      time: "01:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  # Examples App
  - package-ecosystem: npm
    directory: "/examples/openfeature_web/webapp"
    schedule:
      interval: weekly
      time: "01:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: "/examples/openfeature_nodejs/nodejs-app"
    schedule:
      interval: weekly
      time: "01:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
