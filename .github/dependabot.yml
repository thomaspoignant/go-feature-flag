  # Website CI scripts
  - package-ecosystem: gomod
    directory: "/website/.ci"
    schedule:
      interval: weekly
      time: "01:00"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: "/openfeature/ci_scripts/"
    schedule:
      interval: weekly
      time: "04:20"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  - package-ecosystem: gomod
    directory: "/modules/core"
    schedule:
      interval: daily
      time: "01:15"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "automerge"
