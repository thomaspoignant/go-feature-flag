version: 2
updates:
  # Main project
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: daily
      time: "01:00"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      time: "04:00"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  # Integration tests
  - package-ecosystem: nuget
    directory: "/openfeature/provider_tests/dotnet-integration-tests"
    schedule:
      interval: daily
      time: "04:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  - package-ecosystem: gomod
    directory: "/openfeature/provider_tests/go-integration-tests"
    schedule:
      interval: daily
      time: "04:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: "/openfeature/provider_tests/js-integration-tests"
    schedule:
      interval: daily
      time: "04:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  - package-ecosystem: maven
    directory: "/openfeature/provider_tests/java-integration-tests"
